<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'edit'} ? 'Edit Case - LexFlow' : 'New Case - LexFlow'">Case Form - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link active" th:href="@{/cases}">Cases</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/cases}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Cases</a>
        <h1 class="fw-bold mb-1" th:text="${formMode == 'edit'} ? 'Edit Case' : 'New Case'">Case Form</h1>
        <p class="text-muted mb-0">Create or update a legal case.</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="${formMode == 'edit'} ? @{/cases/{id}/edit(id=${legalCase.id})} : @{/cases}"
                  th:object="${legalCase}"
                  method="post">

                <div class="mb-3">
                    <label for="title" class="form-label">Case Title</label>
                    <input type="text" id="title" class="form-control" th:field="*{title}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                        Title error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="client" class="form-label">Client</label>
                    <input type="text" id="client" class="form-control" th:field="*{client}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('client')}"
                         th:errors="*{client}">
                        Client error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label">Case Type</label>
                    <select id="type" class="form-select" th:field="*{type}">
                        <option value="">Select case type</option>
                        <option value="CONTRACT">CONTRACT</option>
                        <option value="COMPLIANCE">COMPLIANCE</option>
                        <option value="LITIGATION">LITIGATION</option>
                        <option value="CORPORATE">CORPORATE</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('type')}"
                         th:errors="*{type}">
                        Type error
                    </div>
                </div>

                <div class="mb-4">
                    <label for="status" class="form-label">Status</label>
                    <select id="status" class="form-select" th:field="*{status}">
                        <option value="">Select status</option>
                        <option value="OPEN">OPEN</option>
                        <option value="IN_PROGRESS">IN_PROGRESS</option>
                        <option value="ON_HOLD">ON_HOLD</option>
                        <option value="CLOSED">CLOSED</option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('status')}"
                         th:errors="*{status}">
                        Status error
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark"
                            th:text="${formMode == 'edit'} ? 'Update Case' : 'Create Case'">
                        Save
                    </button>
                    <a th:href="@{/cases}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
