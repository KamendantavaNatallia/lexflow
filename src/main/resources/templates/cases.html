<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cases - LexFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">LexFlow</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link active" href="/cases">Cases</a>
      <a class="nav-link" href="/deadlines/overdue">Overdue Deadlines</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold">Cases</h1>
      <p class="text-muted mb-0">Manage legal cases and track their status.</p>
    </div>
    <a href="/cases/new" class="btn btn-dark">Add New Case</a>
  </div>

  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body">
      <form method="get" action="/cases" class="row g-3 align-items-end">
        <div class="col-md-6">
          <label for="keyword" class="form-label">Search</label>
          <input type="text"
                 id="keyword"
                 name="keyword"
                 class="form-control"
                 placeholder="Search by title or client"
                 th:value="${keyword}">
        </div>

        <div class="col-md-3">
          <label for="status" class="form-label">Status</label>
          <select id="status" name="status" class="form-select">
            <option value="ALL" th:selected="${selectedStatus == 'ALL'}">ALL</option>
            <option value="OPEN" th:selected="${selectedStatus == 'OPEN'}">OPEN</option>
            <option value="IN_PROGRESS" th:selected="${selectedStatus == 'IN_PROGRESS'}">IN_PROGRESS</option>
            <option value="ON_HOLD" th:selected="${selectedStatus == 'ON_HOLD'}">ON_HOLD</option>
            <option value="CLOSED" th:selected="${selectedStatus == 'CLOSED'}">CLOSED</option>
          </select>
        </div>

        <div class="col-md-3 d-flex gap-2">
          <button type="submit" class="btn btn-dark w-100">Apply</button>
          <a href="/cases" class="btn btn-outline-secondary w-100">Reset</a>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div th:if="${#lists.isEmpty(cases)}">
        <p class="text-muted mb-0">No cases found for the selected filters.</p>
      </div>

      <table class="table table-hover align-middle mb-0" th:if="${!#lists.isEmpty(cases)}">
        <thead>
        <tr>
          <th>Title</th>
          <th>Client</th>
          <th>Type</th>
          <th>Status</th>
          <th class="text-end">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="caseItem : ${cases}">
          <td>
            <a th:href="@{'/cases/' + ${caseItem.id}}"
               th:text="${caseItem.title}"
               class="text-decoration-none fw-semibold">
              Case Title
            </a>
          </td>
          <td th:text="${caseItem.client}">Client Name</td>
          <td>
                        <span class="badge rounded-pill text-bg-light border"
                              th:text="${caseItem.type}">
                            CONTRACT
                        </span>
          </td>
          <td>
                        <span class="badge rounded-pill"
                              th:text="${caseItem.status}"
                              th:classappend="
                                ${caseItem.status == 'OPEN'} ? ' text-bg-primary' :
                                (${caseItem.status == 'IN_PROGRESS'} ? ' text-bg-warning' :
                                (${caseItem.status == 'ON_HOLD'} ? ' text-bg-secondary' :
                                (${caseItem.status == 'CLOSED'} ? ' text-bg-success' : ' text-bg-light')))"
                        >
                            Status
                        </span>
          </td>
          <td class="text-end">
            <a th:href="@{'/cases/' + ${caseItem.id} + '/edit'}"
               class="btn btn-sm btn-outline-primary">
              Edit
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
