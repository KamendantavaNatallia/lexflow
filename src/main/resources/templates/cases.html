<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cases - LexFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
    <div class="navbar-nav">
      <a class="nav-link" th:href="@{/}">Home</a>
      <a class="nav-link active" th:href="@{/cases}">Cases</a>
      <a class="nav-link" th:href="@{/deadlines/overdue}">Overdue Deadlines</a>
    </div>
  </div>
</nav>

<div class="container py-5">

  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${successMessage}">Success message</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h1 class="fw-bold mb-1">Cases</h1>
      <p class="text-muted mb-0">Manage all legal cases in one place.</p>
    </div>

    <a th:href="@{/cases/new}" class="btn btn-dark">New Case</a>
  </div>

  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body">
      <form th:action="@{/cases}" method="get" class="row g-3 align-items-end">
        <div class="col-md-6">
          <label for="keyword" class="form-label">Search</label>
          <input type="text"
                 id="keyword"
                 name="keyword"
                 class="form-control"
                 placeholder="Search by title or client"
                 th:value="${keyword}">
        </div>

        <div class="col-md-4">
          <label for="status" class="form-label">Status</label>
          <select id="status" name="status" class="form-select">
            <option value="ALL" th:selected="${selectedStatus == 'ALL'}">All</option>
            <option value="OPEN" th:selected="${selectedStatus == 'OPEN'}">Open</option>
            <option value="IN_PROGRESS" th:selected="${selectedStatus == 'IN_PROGRESS'}">In Progress</option>
            <option value="ON_HOLD" th:selected="${selectedStatus == 'ON_HOLD'}">On Hold</option>
            <option value="CLOSED" th:selected="${selectedStatus == 'CLOSED'}">Closed</option>
          </select>
        </div>

        <div class="col-md-2 d-grid">
          <button type="submit" class="btn btn-outline-dark">Filter</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div th:if="${cases == null or cases.isEmpty()}">
        <p class="text-muted mb-0">No cases found.</p>
      </div>

      <div class="table-responsive" th:if="${cases != null and !cases.isEmpty()}">
        <table class="table align-middle mb-0">
          <thead>
          <tr>
            <th>Title</th>
            <th>Client</th>
            <th>Type</th>
            <th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="legalCase : ${cases}">
            <td>
              <a th:href="@{/cases/{id}(id=${legalCase.id})}"
                 th:text="${legalCase.title}"
                 class="text-decoration-none fw-semibold text-dark">
                Case Title
              </a>
            </td>
            <td th:text="${legalCase.client}">Client Name</td>
            <td th:text="${legalCase.type}">Type</td>
            <td th:text="${legalCase.status}">Status</td>
            <td class="text-end">
              <div class="d-inline-flex gap-2">
                <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-sm btn-outline-secondary">
                  View
                </a>
                <a th:href="@{/cases/{id}/edit(id=${legalCase.id})}" class="btn btn-sm btn-outline-primary">
                  Edit
                </a>
                <form th:action="@{/cases/{id}/delete(id=${legalCase.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this case and all related data?');"
                      class="d-inline">
                  <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
