<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'edit'} ? 'Edit Deadline - LexFlow' : 'New Deadline - LexFlow'">Deadline Form - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: mainNav('cases')}"></div>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
        <h1 class="fw-bold mb-1" th:text="${formMode == 'edit'} ? 'Edit Deadline' : 'New Deadline'">Deadline Form</h1>
        <p class="text-muted mb-0">
            Case:
            <span th:text="${legalCase.title}">Case title</span>
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <form th:if="${formMode == 'edit'}"
                  th:action="@{/deadlines/{id}/edit(id=${deadline.id})}"
                  th:object="${deadline}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="title-edit" class="form-label">Deadline Title</label>
                    <input type="text" id="title-edit" class="form-control" th:field="*{title}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                        Title error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="dueDate-edit" class="form-label">Due Date</label>
                    <input type="date" id="dueDate-edit" class="form-control" th:field="*{dueDate}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('dueDate')}"
                         th:errors="*{dueDate}">
                        Due date error
                    </div>
                </div>

                <div class="mb-4">
                    <label for="priority-edit" class="form-label">Priority</label>
                    <select id="priority-edit" class="form-select" th:field="*{priority}">
                        <option value="">Select priority</option>
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                        <option value="URGENT">URGENT</option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('priority')}"
                         th:errors="*{priority}">
                        Priority error
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Update Deadline</button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>

            <form th:if="${formMode != 'edit'}"
                  th:action="@{/cases/{id}/deadlines(id=${legalCase.id})}"
                  th:object="${deadline}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="title-create" class="form-label">Deadline Title</label>
                    <input type="text" id="title-create" class="form-control" th:field="*{title}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                        Title error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="dueDate-create" class="form-label">Due Date</label>
                    <input type="date" id="dueDate-create" class="form-control" th:field="*{dueDate}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('dueDate')}"
                         th:errors="*{dueDate}">
                        Due date error
                    </div>
                </div>

                <div class="mb-4">
                    <label for="priority-create" class="form-label">Priority</label>
                    <select id="priority-create" class="form-select" th:field="*{priority}">
                        <option value="">Select priority</option>
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                        <option value="URGENT">URGENT</option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('priority')}"
                         th:errors="*{priority}">
                        Priority error
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Create Deadline</button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
