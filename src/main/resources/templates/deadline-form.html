<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formMode == 'edit'} ? 'Edit Deadline - LexFlow' : 'New Deadline - LexFlow'">Deadline Form - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link active" th:href="@{/cases}">Cases</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
        <h1 class="fw-bold mb-1" th:text="${formMode == 'edit'} ? 'Edit Deadline' : 'New Deadline'">Deadline Form</h1>
        <p class="text-muted mb-0">
            Case:
            <span th:text="${legalCase.title}">Case title</span>
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="${formMode == 'edit'} ? @{/deadlines/{id}/edit(id=${deadline.id})} : @{/cases/{id}/deadlines(id=${legalCase.id})}"
                  th:object="${deadline}"
                  method="post">

                <div class="mb-3">
                    <label for="title" class="form-label">Deadline Title</label>
                    <input type="text" id="title" class="form-control" th:field="*{title}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                        Title error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="dueDate" class="form-label">Due Date</label>
                    <input type="date" id="dueDate" class="form-control" th:field="*{dueDate}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('dueDate')}"
                         th:errors="*{dueDate}">
                        Due date error
                    </div>
                </div>

                <div class="mb-4">
                    <label for="priority" class="form-label">Priority</label>
                    <select id="priority" class="form-select" th:field="*{priority}">
                        <option value="">Select priority</option>
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                        <option value="URGENT">URGENT</option>
                    </select>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('priority')}"
                         th:errors="*{priority}">
                        Priority error
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark"
                            th:text="${formMode == 'edit'} ? 'Update Deadline' : 'Create Deadline'">
                        Save
                    </button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
