<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - LexFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #f8f9fa 0%, #eef2f7 100%);
            min-height: 100vh;
        }

        .login-card {
            max-width: 520px;
            margin: 80px auto;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .login-header {
            background-color: #212529;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .brand-title {
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-bottom: 0.25rem;
        }

        .demo-box {
            background-color: #f8f9fa;
            border-radius: 0.75rem;
            padding: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card login-card">
        <div class="login-header">
            <h1 class="brand-title">LexFlow</h1>
            <p class="mb-0 opacity-75">Legal workflow management</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="h4 fw-bold mb-2">Sign in</h2>
                <p class="text-muted mb-0">Use your account to continue</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post" class="mb-4">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input id="username"
                           name="username"
                           type="text"
                           class="form-control"
                           placeholder="Enter username"
                           required
                           autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input id="password"
                           name="password"
                           type="password"
                           class="form-control"
                           placeholder="Enter password"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg">Login</button>
                </div>
            </form>

            <div class="demo-box">
                <div class="fw-semibold mb-2">Demo accounts</div>
                <div class="small text-muted mb-1">
                    Admin:
                    <strong>admin</strong> /
                    <strong>admin123</strong>
                </div>
                <div class="small text-muted">
                    User:
                    <strong>user</strong> /
                    <strong>user123</strong>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
