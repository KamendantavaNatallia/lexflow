<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${formMode == 'edit'} ? 'Edit Note - LexFlow' : 'New Note - LexFlow'">Note Form - LexFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: mainNav('cases')}"></div>

<div class="container py-5">
  <div class="mb-4">
    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
    <h1 class="fw-bold mb-1" th:text="${formMode == 'edit'} ? 'Edit Note' : 'New Note'">Note Form</h1>
    <p class="text-muted mb-0">
      Case:
      <span th:text="${legalCase.title}">Case title</span>
    </p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">

      <form th:if="${formMode == 'edit'}"
            th:action="@{/notes/{id}/edit(id=${note.id})}"
            th:object="${note}"
            method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="mb-4">
          <label for="content-edit" class="form-label">Note Content</label>
          <textarea id="content-edit"
                    class="form-control"
                    rows="6"
                    th:field="*{content}"></textarea>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}">
            Content error
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Update Note</button>
          <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

      <form th:if="${formMode != 'edit'}"
            th:action="@{/cases/{id}/notes(id=${legalCase.id})}"
            th:object="${note}"
            method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="mb-4">
          <label for="content-create" class="form-label">Note Content</label>
          <textarea id="content-create"
                    class="form-control"
                    rows="6"
                    th:field="*{content}"></textarea>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}">
            Content error
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Add Note</button>
          <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

</body>
</html>
