<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${formMode == 'edit'} ? 'Edit Note - LexFlow' : 'New Note - LexFlow'">Note Form - LexFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
    <div class="navbar-nav">
      <a class="nav-link" th:href="@{/}">Home</a>
      <a class="nav-link active" th:href="@{/cases}">Cases</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="mb-4">
    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
    <h1 class="fw-bold mb-1" th:text="${formMode == 'edit'} ? 'Edit Note' : 'New Note'">Note Form</h1>
    <p class="text-muted mb-0">
      Case:
      <span th:text="${legalCase.title}">Case title</span>
    </p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form th:action="${formMode == 'edit'} ? @{/notes/{id}/edit(id=${note.id})} : @{/cases/{id}/notes(id=${legalCase.id})}"
            th:object="${note}"
            method="post">

        <div class="mb-4">
          <label for="content" class="form-label">Note Content</label>
          <textarea id="content"
                    class="form-control"
                    rows="6"
                    th:field="*{content}"></textarea>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}">
            Content error
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark"
                  th:text="${formMode == 'edit'} ? 'Update Note' : 'Add Note'">
            Save
          </button>
          <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
