<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${formMode == 'edit'} ? 'Edit Note - LexFlow' : 'New Note - LexFlow'">Note Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">LexFlow</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link active" href="/cases">Cases</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="mb-4">
    <a th:href="@{'/cases/' + ${legalCase.id}}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
    <h1 class="fw-bold" th:text="${formMode == 'edit'} ? 'Edit Note' : 'Add Note'">Note Form</h1>
    <p class="text-muted" th:text="'Case: ' + ${legalCase.title}">Case title</p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">

      <form th:if="${formMode == 'create'}"
            th:action="@{'/cases/' + ${legalCase.id} + '/notes'}"
            th:object="${note}"
            method="post">

        <div class="mb-4">
          <label for="content" class="form-label">Note</label>
          <textarea id="content" class="form-control" th:field="*{content}" rows="5"></textarea>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}"></div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Save Note</button>
          <a th:href="@{'/cases/' + ${legalCase.id}}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

      <form th:if="${formMode == 'edit'}"
            th:action="@{'/notes/' + ${note.id} + '/edit'}"
            th:object="${note}"
            method="post">

        <div class="mb-4">
          <label for="contentEdit" class="form-label">Note</label>
          <textarea id="contentEdit" class="form-control" th:field="*{content}" rows="5"></textarea>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}"></div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Save Changes</button>
          <a th:href="@{'/cases/' + ${legalCase.id}}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

</body>
</html>
