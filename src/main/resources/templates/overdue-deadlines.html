<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overdue Deadlines - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/cases">Cases</a>
            <a class="nav-link active" href="/deadlines/overdue">Overdue Deadlines</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <h1 class="fw-bold" th:text="${pageTitle}">Overdue Deadlines</h1>
        <p class="text-muted" th:text="${pageDescription}">Deadlines with due dates before today.</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(deadlines)}">
                <p class="text-muted mb-0">No overdue deadlines.</p>
            </div>

            <table class="table table-hover align-middle mb-0" th:if="${!#lists.isEmpty(deadlines)}">
                <thead>
                <tr>
                    <th>Deadline</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Case</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="deadline : ${deadlines}">
                    <td>
                        <div class="fw-semibold" th:text="${deadline.title}">Deadline title</div>
                        <span class="badge bg-danger">Overdue</span>
                    </td>
                    <td class="text-danger fw-semibold" th:text="${deadline.dueDate}">2026-04-01</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:text="${deadline.priority}"
                              th:classappend="
                                ${deadline.priority == 'LOW'} ? ' text-bg-light border' :
                                (${deadline.priority == 'MEDIUM'} ? ' text-bg-secondary' :
                                (${deadline.priority == 'HIGH'} ? ' text-bg-warning' :
                                (${deadline.priority == 'URGENT'} ? ' text-bg-danger' : ' text-bg-light')))"
                        >
                            HIGH
                        </span>
                    </td>
                    <td>
                        <a th:href="@{'/cases/' + ${deadline.legalCase.id}}"
                           th:text="${deadline.legalCase.title}"
                           class="text-decoration-none fw-semibold">
                            Case Title
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
