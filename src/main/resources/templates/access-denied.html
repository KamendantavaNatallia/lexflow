<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - LexFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .denied-card {
            max-width: 720px;
            margin: 80px auto;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNav('cases')}"></div>

<div class="container">
    <div class="card denied-card">
        <div class="card-body p-5 text-center">
            <h1 class="display-5 fw-bold mb-3">Access denied</h1>
            <p class="lead text-secondary mb-4">
                You are signed in, but you do not have permission to access this page.
            </p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a th:href="@{/}" class="btn btn-dark">Back to Dashboard</a>
                <a th:href="@{/cases}" class="btn btn-outline-secondary">View Cases</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
