<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link active" th:href="@{/cases}">Cases</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
        <h1 class="fw-bold mb-1">Upload Document</h1>
        <p class="text-muted mb-0">
            Case:
            <span th:text="${legalCase.title}">Case title</span>
        </p>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">Error message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Success message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/cases/{id}/documents(id=${legalCase.id})}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-4">
                    <label for="file" class="form-label">Choose File</label>
                    <input type="file"
                           id="file"
                           name="file"
                           class="form-control"
                           required
                           accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg">
                    <div class="form-text">
                        Allowed formats: PDF, DOC, DOCX, TXT, PNG, JPG. Maximum size: 10 MB.
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Upload Document</button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
