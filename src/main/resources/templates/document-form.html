<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Document - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link active" href="/cases">Cases</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{'/cases/' + ${legalCase.id}}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
        <h1 class="fw-bold">Add Document</h1>
        <p class="text-muted" th:text="'Case: ' + ${legalCase.title}">Case title</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{'/cases/' + ${legalCase.id} + '/documents'}" th:object="${document}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">Document Name</label>
                    <input type="text" id="name" class="form-control" th:field="*{name}">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label">Document Type</label>
                    <input type="text" id="type" class="form-control" th:field="*{type}" placeholder="e.g. Contract Draft, Evidence Summary, Checklist">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" class="form-control" th:field="*{description}" rows="4"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Save Document</button>
                    <a th:href="@{'/cases/' + ${legalCase.id}}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
