<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Form - LexFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link active" th:href="@{/cases}">Cases</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary btn-sm mb-3">← Back to Case</a>
        <h1 class="fw-bold mb-1">Add Document</h1>
        <p class="text-muted mb-0">
            Case:
            <span th:text="${legalCase.title}">Case title</span>
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/cases/{id}/documents(id=${legalCase.id})}"
                  th:object="${document}"
                  method="post">

                <div class="mb-3">
                    <label for="fileName" class="form-label">Document Name</label>
                    <input type="text"
                           id="fileName"
                           class="form-control"
                           th:field="*{fileName}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('fileName')}"
                         th:errors="*{fileName}">
                        Document name error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="fileType" class="form-label">Document Type</label>
                    <input type="text"
                           id="fileType"
                           class="form-control"
                           th:field="*{fileType}">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('fileType')}"
                         th:errors="*{fileType}">
                        Document type error
                    </div>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">Description</label>
                    <textarea id="content"
                              class="form-control"
                              rows="4"
                              th:field="*{content}"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Save Document</button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
