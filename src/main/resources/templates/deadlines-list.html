<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - LexFlow'">Deadlines - LexFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .table-card {
            border: 0;
            border-radius: 0.75rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">LexFlow</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Dashboard</a>
                <a class="nav-link" th:href="@{/cases}">Cases</a>
                <a class="nav-link"
                   th:classappend="${activeTab == 'overdue'} ? ' active' : ''"
                   th:href="@{/deadlines/overdue}">
                    Overdue Deadlines
                </a>
                <a class="nav-link"
                   th:classappend="${activeTab == 'upcoming'} ? ' active' : ''"
                   th:href="@{/deadlines/upcoming}">
                    Upcoming Deadlines
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="page-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <h1 class="fw-bold mb-2" th:text="${pageTitle}">Deadlines</h1>
            <p class="text-muted mb-0" th:text="${pageDescription}">Deadline list</p>
        </div>

        <a th:href="@{/}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div th:if="${deadlines == null or #lists.isEmpty(deadlines)}" class="empty-state">
        <h4 class="fw-semibold mb-3" th:text="${emptyMessage}">No deadlines found.</h4>
    </div>

    <div th:if="${deadlines != null and !#lists.isEmpty(deadlines)}" class="card table-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">Title</th>
                        <th class="py-3">Due Date</th>
                        <th class="py-3">Priority</th>
                        <th class="py-3">Case</th>
                        <th class="py-3 text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="deadline : ${deadlines}">
                        <td class="px-4 py-3">
                            <div class="fw-semibold" th:text="${deadline.title}">Deadline title</div>
                        </td>

                        <td class="py-3" th:text="${deadline.dueDate}">2026-04-22</td>

                        <td class="py-3">
                            <span class="badge text-bg-secondary" th:text="${deadline.priority}">HIGH</span>
                        </td>

                        <td class="py-3">
                            <a class="text-decoration-none fw-medium"
                               th:href="@{/cases/{id}(id=${deadline.legalCase.id})}"
                               th:text="${deadline.legalCase.title}">
                                Case title
                            </a>
                        </td>

                        <td class="py-3 pe-4 text-end">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/cases/{id}(id=${deadline.legalCase.id})}">
                                View Case
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
